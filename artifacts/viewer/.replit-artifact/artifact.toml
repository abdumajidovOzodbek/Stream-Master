kind = "web"
previewPath = "/"
title = "Telegram Channel Videos"
version = "1.0.0"
id = "artifacts/viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19557

[services.development]
run = "pnpm --filter @workspace/viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viewer", "run", "build" ]
publicDir = "artifacts/viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19557"
BASE_PATH = "/"
